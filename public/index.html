<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <title>Chinto Patum - Full Stack Developer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            syne: ["Syne", "sans-serif"]
          },
          maxWidth: {
            "8xl": "110rem"
          },
          fontSize: {
            "hero": ["clamp(48px, 12vw, 176px)", { lineHeight: "1", letterSpacing: "-0.05em" }],
            "section": ["clamp(36px, 6vw, 96px)", { lineHeight: "1.2", letterSpacing: "-0.05em" }]
          }
        }
      }
    }
  </script>
  <style>
    .contact-headline {
      font-family: 'Syne', sans-serif;
      font-size: clamp(52px, 9vw, 130px);
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 0.88;
      overflow: hidden;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .marquee-wrapper {
      overflow: hidden;
      white-space: nowrap;
    }

    .marquee-track {
      display: inline-flex;
      gap: 2rem;
      animation: marquee 20s linear infinite;
    }

    .marquee-wrapper:hover .marquee-track {
      animation-play-state: paused;
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }
  </style>
</head>

<body class="bg-white text-black dark:bg-zinc-950 dark:text-white transition-colors duration-300">

  <!-- Navbar -->
  <nav
    class="fixed top-4 left-1/2 -translate-x-1/2 z-50 border border-zinc-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-sm rounded-full px-4 md:px-6 py-3 flex items-center gap-4 md:gap-8 w-[calc(100%-2rem)] md:w-auto">
    <a href="#hero" class="font-syne font-extrabold text-sm">ch1nto</a>
    <div class="flex items-center gap-4 md:gap-8 ml-auto">
      <a href="#projects"
        class="text-sm text-zinc-500 hover:text-black dark:hover:text-white transition-colors hidden sm:block">Work</a>
      <a href="#about"
        class="text-sm text-zinc-500 hover:text-black dark:hover:text-white transition-colors hidden sm:block">About</a>
      <a href="#contact"
        class="text-sm text-zinc-500 hover:text-black dark:hover:text-white transition-colors hidden sm:block">Contact</a>
      <button id="themeToggle" class="text-sm text-zinc-500 hover:text-black dark:hover:text-white transition-colors">◐
        Light</button>
    </div>
  </nav>

  <!-- Hero -->
  <section id="hero" class="min-h-screen flex flex-col justify-end pb-16 md:pb-24 pt-32">
    <div class="max-w-8xl mx-auto px-4 md:px-8 w-full">
      <p class="text-sm text-zinc-500 mb-4 fade-in" id="hero-role" style="transition-delay: 0.1s"></p>
      <h1 class="font-syne font-extrabold text-hero overflow-hidden mb-8 md:mb-12" id="hero-name"></h1>
      <p class="text-zinc-500 max-w-md text-sm leading-relaxed fade-in" id="hero-bio" style="transition-delay: 0.3s">
      </p>
    </div>
  </section>

  <!-- Marquee -->
  <div class="marquee-wrapper border-b border-t border-zinc-200 dark:border-zinc-800 py-3">
    <div class="marquee-track" id="marquee-track"></div>
  </div>

  <!-- Projects -->
  <section id="projects" class="py-16 md:py-24 border-t border-zinc-200 dark:border-zinc-800">
    <div class="max-w-8xl mx-auto px-4 md:px-8">
      <p class="font-syne font-extrabold text-section mb-12 md:mb-16">Work</p>
      <div id="projects-list"></div>
    </div>
  </section>

  <!-- About -->
  <section id="about" class="py-16 md:py-24">
    <div class="max-w-8xl mx-auto px-4 md:px-8">
      <p
        class="font-syne font-extrabold text-section mb-12 md:mb-16 border-b border-zinc-200 dark:border-zinc-800 pb-8">
        About</p>
      <div id="about-content" class="grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-24"></div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="pt-16 pb-3 md:pt-24 dark:border-zinc-800">
    <div class="max-w-8xl mx-auto px-4 md:px-8">
      <div id="contact-content"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="border-t border-zinc-200 dark:border-zinc-800 py-8">
    <div class="max-w-8xl mx-auto px-4 md:px-8">
      <p class="text-sm text-zinc-500 text-center">© 2026 Chinto Patum · Full Stack Developer</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/hero.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/about.js"></script>
  <script src="js/contact.js"></script>
</body>

</html>
